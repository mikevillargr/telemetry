name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - production
          - staging
      skip_build:
        description: 'Skip Docker build (use existing images)'
        required: false
        type: boolean
        default: false
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/workflows/release.yml'

env:
  VPS_PATH: /root/telemetry

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file on VPS
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            mkdir -p ${{ env.VPS_PATH }}
            cd ${{ env.VPS_PATH }}
            
            cat > .env << 'ENVEOF'
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=7d
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
            DATABASE_URL=${DATABASE_URL}
            REDIS_URL=${REDIS_URL}
            API_PORT=3001
            NODE_ENV=${{ inputs.environment }}
            ENVEOF
            
            echo ".env file created successfully"
          ENDSSH
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}

      - name: Deploy to VPS
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.VPS_PATH }}
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            
            echo "Code pulled successfully"
          ENDSSH

      - name: Build and Start Docker Containers
        if: inputs.skip_build != true
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.VPS_PATH }}
            
            # Stop existing containers
            docker-compose down || true
            
            # Remove old images
            docker system prune -f
            
            # Build and start new containers
            docker-compose up -d --build
            
            echo "Docker containers started successfully"
          ENDSSH

      - name: Restart Docker Containers (if skip_build)
        if: inputs.skip_build == true
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.VPS_PATH }}
            
            # Restart containers
            docker-compose restart
            
            echo "Docker containers restarted successfully"
          ENDSSH

      - name: Run Database Migrations
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.VPS_PATH }}
            
            # Wait for database to be ready
            sleep 10
            
            # Run migrations
            docker-compose exec -T api npx prisma db push
            
            echo "Database migrations completed successfully"
          ENDSSH

      - name: Verify Deployment
        run: |
          ssh -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd ${{ env.VPS_PATH }}
            
            echo "=== Container Status ==="
            docker-compose ps
            
            echo ""
            echo "=== API Logs (last 20 lines) ==="
            docker-compose logs --tail=20 api
            
            echo ""
            echo "=== Web Logs (last 20 lines) ==="
            docker-compose logs --tail=20 web
          ENDSSH

      - name: Health Check
        run: |
          sleep 30
          
          # Check API health
          API_URL="http://${{ secrets.VPS_HOST }}:3001/health"
          echo "Checking API health at $API_URL"
          
          # Check Web health
          WEB_URL="http://${{ secrets.VPS_HOST }}:3000"
          echo "Checking Web health at $WEB_URL"
          
          echo "Deployment completed successfully!"
        continue-on-error: true

      - name: Cleanup SSH
        if: always()
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts

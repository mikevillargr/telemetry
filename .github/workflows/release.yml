name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        type: boolean
        default: false
      prerelease_type:
        description: 'Prerelease type (if prerelease)'
        required: false
        type: choice
        options:
          - alpha
          - beta
          - rc
        default: beta

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version and increment
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          # Remove 'v' prefix and parse version
          VERSION=${LATEST_TAG#v}
          IFS='.' read -ra VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}
          
          # Increment based on version type
          case "${{ inputs.version_type }}" in
            "major")
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            "minor")
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            "patch")
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          # Build new version
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # Add prerelease suffix if needed
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            # Get prerelease number
            LAST_PRERELEASE=$(git tag -l "${NEW_VERSION}-${{ inputs.prerelease_type }}.*" | tail -1)
            if [ -n "$LAST_PRERELEASE" ]; then
              LAST_NUM=$(echo $LAST_PRERELEASE | grep -oP "${NEW_VERSION}-${{ inputs.prerelease_type }}\.\K\d+")
              PRERELEASE_NUM=$((LAST_NUM + 1))
            else
              PRERELEASE_NUM=1
            fi
            NEW_VERSION="${NEW_VERSION}-${{ inputs.prerelease_type }}.${PRERELEASE_NUM}"
          fi
          
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "previous_version=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "New version: ${NEW_VERSION}"
          echo "Previous version: ${LATEST_TAG}"

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the last tag
          LAST_TAG="${{ steps.version.outputs.previous_version }}"
          
          # Get commits since last tag
          if [ -n "$LAST_TAG" ] && [ "$LAST_TAG" != "v0.0.0" ]; then
            COMMITS=$(git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --reverse)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
          fi
          
          # Categorize commits by type
          echo "### What's Changed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if echo "$COMMITS" | grep -q "feat:"; then
            echo "#### ✨ New Features" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "feat:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "fix:"; then
            echo "#### 🐛 Bug Fixes" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "fix:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "chore:"; then
            echo "#### 🔧 Maintenance" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "chore:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "docs:"; then
            echo "#### 📚 Documentation" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "docs:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "refactor:"; then
            echo "#### ♻️ Refactoring" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "refactor:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "perf:"; then
            echo "#### ⚡ Performance" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "perf:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "test:"; then
            echo "#### ✅ Tests" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "test:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "style:"; then
            echo "#### 💄 Style" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "style:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if echo "$COMMITS" | grep -q "ci:"; then
            echo "#### 🤖 CI/CD" >> $GITHUB_STEP_SUMMARY
            echo "$COMMITS" | grep "ci:" | sed 's/^/  /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Save release notes to file
          cat $GITHUB_STEP_SUMMARY > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "### ✅ Release Created Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Previous Version:** ${{ steps.version.outputs.previous_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Prerelease:** ${{ inputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
